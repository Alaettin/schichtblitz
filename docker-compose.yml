services:
  db:
    image: postgres:16-alpine
    container_name: schichtblitz_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: schichtblitz
      POSTGRES_PASSWORD: schichtblitz123
      POSTGRES_DB: schichtblitz
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
